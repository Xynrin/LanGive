name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: false
        type: choice
        options:
          - all
          - windows
          - macos
          - linux

jobs:
  # ==================== Windows Build ====================
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: '386'
          - arch: arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Generate Wails bindings
      run: |
        # 先放占位让 //go:embed all:frontend/dist 能匹配到东西，否则 wails generate 会先 fail
        mkdir -p frontend/dist
        touch frontend/dist/.gitkeep
        wails generate module

    - name: Build frontend assets
      shell: bash
      run: |
        cd frontend
        npm run build
        test -f dist/index.html || (echo "ERROR: frontend/dist/index.html missing" && exit 1)

    - name: Build Windows
      env:
        GOOS: windows
        GOARCH: ${{ matrix.arch }}
      run: |
        wails build -platform windows/${{ matrix.arch }} -s -ldflags "-X main.Version=${{ github.ref_name }}"

    - name: Rename output
      shell: bash
      run: |
        cd build/bin
        mv LanGive.exe "LanGive-windows-${{ matrix.arch }}.exe"

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: LanGive-windows-${{ matrix.arch }}
        path: build/bin/LanGive-windows-${{ matrix.arch }}.exe

  # ==================== macOS Build ====================
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Generate Wails bindings
      run: |
        mkdir -p frontend/dist
        touch frontend/dist/.gitkeep
        wails generate module

    - name: Build frontend assets
      run: |
        cd frontend
        npm run build
        test -f dist/index.html || (echo "ERROR: frontend/dist/index.html missing" && exit 1)

    - name: Build macOS
      env:
        GOOS: darwin
        GOARCH: ${{ matrix.arch }}
      run: |
        wails build -platform darwin/${{ matrix.arch }} -s -ldflags "-X main.Version=${{ github.ref_name }}"

    - name: Package macOS app
      run: |
        cd build/bin
        zip -r "LanGive-macos-${{ matrix.arch }}.zip" LanGive.app

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: LanGive-macos-${{ matrix.arch }}
        path: build/bin/LanGive-macos-${{ matrix.arch }}.zip

  # ==================== Linux Build (amd64 + arm64, AppImage + deb + RPM) ====================
  # amd64 在 ubuntu-latest 原生编译；arm64 在 ubuntu-24.04-arm 原生编译，避免交叉编译 GTK/WebKit 的复杂度。
  # Wails 2.10 默认链接 webkit2gtk-4.0，Ubuntu 24.04 仅有 4.1，故强制 -tags webkit2_41。
  build-linux:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            debarch: amd64
            rpmarch: x86_64
            appimage_arch: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            debarch: arm64
            rpmarch: aarch64
            appimage_arch: aarch64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Generate Wails bindings
      run: |
        mkdir -p frontend/dist
        touch frontend/dist/.gitkeep
        wails generate module

    - name: Build frontend assets
      run: |
        cd frontend
        npm run build
        test -f dist/index.html || (echo "ERROR: frontend/dist/index.html missing" && exit 1)

    - name: Install Linux build dependencies
      run: |
        sudo apt-get update
        # libfuse2 是 appimagetool 自身（也是个 AppImage）自解压所需
        # imagemagick 用来从 assets/logo.jpg 生成 PNG 图标
        sudo apt-get install -y \
          libgtk-3-dev libwebkit2gtk-4.1-dev \
          rpm fakeroot dpkg-dev file wget imagemagick libfuse2t64 || \
        sudo apt-get install -y \
          libgtk-3-dev libwebkit2gtk-4.1-dev \
          rpm fakeroot dpkg-dev file wget imagemagick libfuse2

    - name: Generate icons from assets/logo.jpg
      run: |
        mkdir -p build/icons
        for size in 16 32 48 64 128 256 512; do
          convert assets/logo.jpg -resize ${size}x${size} build/icons/langive-${size}.png
        done
        cp build/icons/langive-256.png build/icons/langive.png

    - name: Build Linux (native CGO)
      env:
        GOOS: linux
        CGO_ENABLED: '1'
      run: |
        wails build -platform linux/${{ matrix.arch }} -s -tags webkit2_41 -ldflags "-X main.Version=${{ github.ref_name }}"

    - name: Rename binary
      run: |
        cd build/bin
        mv LanGive "LanGive-linux-${{ matrix.arch }}"
        chmod +x "LanGive-linux-${{ matrix.arch }}"

    - name: Build AppImage
      run: |
        cd build/bin
        APPIMAGE_TOOL_ARCH="${{ matrix.appimage_arch }}"
        wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${APPIMAGE_TOOL_ARCH}.AppImage" -O appimagetool || \
        wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
        chmod +x appimagetool

        APPDIR=LanGive.AppDir
        mkdir -p $APPDIR/usr/bin \
                 $APPDIR/usr/share/applications \
                 $APPDIR/usr/share/icons/hicolor/256x256/apps
        cp "LanGive-linux-${{ matrix.arch }}" $APPDIR/usr/bin/LanGive

        # 真图标（来自 assets/logo.jpg）
        cp ../../build/icons/langive-256.png $APPDIR/LanGive.png
        cp ../../build/icons/langive-256.png $APPDIR/usr/share/icons/hicolor/256x256/apps/LanGive.png

        cat > $APPDIR/LanGive.desktop << 'EOF'
        [Desktop Entry]
        Name=LanGive
        GenericName=LAN File Transfer
        Comment=局域网文件传输工具
        Exec=LanGive
        Icon=LanGive
        Terminal=false
        Type=Application
        Categories=Network;FileTransfer;
        Keywords=lan;transfer;share;file;
        EOF
        cp $APPDIR/LanGive.desktop $APPDIR/usr/share/applications/

        cat > $APPDIR/AppRun << 'EOF'
        #!/bin/sh
        HERE="$(dirname "$(readlink -f "$0")")"
        exec "$HERE/usr/bin/LanGive" "$@"
        EOF
        chmod +x $APPDIR/AppRun

        ARCH=${APPIMAGE_TOOL_ARCH} ./appimagetool --no-appstream $APPDIR "LanGive-linux-${{ matrix.arch }}.AppImage" || \
        ARCH=${APPIMAGE_TOOL_ARCH} ./appimagetool $APPDIR "LanGive-linux-${{ matrix.arch }}.AppImage"

    - name: Build .deb
      run: |
        cd build/bin
        VERSION="${GITHUB_REF_NAME#v}"
        [ -z "$VERSION" ] && VERSION="0.0.0"
        PKG="langive_${VERSION}_${{ matrix.debarch }}"

        mkdir -p "$PKG/DEBIAN" \
                 "$PKG/usr/bin" \
                 "$PKG/usr/share/applications"
        for s in 16 32 48 64 128 256 512; do
          mkdir -p "$PKG/usr/share/icons/hicolor/${s}x${s}/apps"
          cp ../../build/icons/langive-${s}.png "$PKG/usr/share/icons/hicolor/${s}x${s}/apps/langive.png"
        done

        cp "LanGive-linux-${{ matrix.arch }}" "$PKG/usr/bin/langive"
        chmod 755 "$PKG/usr/bin/langive"

        cat > "$PKG/usr/share/applications/langive.desktop" << 'EOF'
        [Desktop Entry]
        Name=LanGive
        GenericName=LAN File Transfer
        Comment=局域网文件传输工具
        Exec=langive
        Icon=langive
        Terminal=false
        Type=Application
        Categories=Network;FileTransfer;
        Keywords=lan;transfer;share;file;
        EOF

        cat > "$PKG/DEBIAN/control" << EOF
        Package: langive
        Version: ${VERSION}
        Section: net
        Priority: optional
        Architecture: ${{ matrix.debarch }}
        Maintainer: Xynrin <noreply@example.com>
        Depends: libgtk-3-0, libwebkit2gtk-4.1-0
        Description: Cross-platform LAN file transfer tool
         LanGive is a cross-platform LAN file transfer tool built with Wails v2.
        EOF

        cat > "$PKG/DEBIAN/postinst" << 'EOF'
        #!/bin/sh
        set -e
        if command -v gtk-update-icon-cache >/dev/null 2>&1; then
          gtk-update-icon-cache -f /usr/share/icons/hicolor || true
        fi
        if command -v update-desktop-database >/dev/null 2>&1; then
          update-desktop-database /usr/share/applications || true
        fi
        EOF
        chmod 755 "$PKG/DEBIAN/postinst"

        dpkg-deb --build --root-owner-group "$PKG"
        mv "${PKG}.deb" "LanGive-linux-${{ matrix.arch }}.deb"

    - name: Build .rpm
      run: |
        cd build/bin
        VERSION="${GITHUB_REF_NAME#v}"
        [ -z "$VERSION" ] && VERSION="0.0.0"

        mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
        BIN="$(pwd)/LanGive-linux-${{ matrix.arch }}"
        ICONS_DIR="$(pwd)/../../build/icons"

        # 准备 desktop 文件
        cat > /tmp/langive.desktop << 'EOF'
        [Desktop Entry]
        Name=LanGive
        GenericName=LAN File Transfer
        Comment=局域网文件传输工具
        Exec=langive
        Icon=langive
        Terminal=false
        Type=Application
        Categories=Network;FileTransfer;
        Keywords=lan;transfer;share;file;
        EOF

        cat > ~/rpmbuild/SPECS/langive.spec << EOF
        Name:           langive
        Version:        ${VERSION}
        Release:        1%{?dist}
        Summary:        Cross-platform LAN file transfer tool
        License:        MIT
        URL:            https://github.com/Xynrin/LanGive
        BuildArch:      ${{ matrix.rpmarch }}
        AutoReqProv:    no
        Requires:       gtk3
        Requires:       (webkit2gtk4.1 or webkit2gtk-4.1)

        %description
        LanGive is a cross-platform LAN file transfer tool built with Wails v2.

        %install
        mkdir -p %{buildroot}/usr/bin
        mkdir -p %{buildroot}/usr/share/applications
        install -m 0755 ${BIN} %{buildroot}/usr/bin/langive
        install -m 0644 /tmp/langive.desktop %{buildroot}/usr/share/applications/langive.desktop
        for s in 16 32 48 64 128 256 512; do
          mkdir -p %{buildroot}/usr/share/icons/hicolor/\${s}x\${s}/apps
          install -m 0644 ${ICONS_DIR}/langive-\${s}.png \\
            %{buildroot}/usr/share/icons/hicolor/\${s}x\${s}/apps/langive.png
        done

        %files
        /usr/bin/langive
        /usr/share/applications/langive.desktop
        /usr/share/icons/hicolor/*/apps/langive.png

        %post
        if command -v gtk-update-icon-cache >/dev/null 2>&1; then
          gtk-update-icon-cache -f /usr/share/icons/hicolor || true
        fi
        if command -v update-desktop-database >/dev/null 2>&1; then
          update-desktop-database /usr/share/applications || true
        fi

        %postun
        if command -v gtk-update-icon-cache >/dev/null 2>&1; then
          gtk-update-icon-cache -f /usr/share/icons/hicolor || true
        fi
        EOF

        rpmbuild -bb --target=${{ matrix.rpmarch }} ~/rpmbuild/SPECS/langive.spec
        cp ~/rpmbuild/RPMS/${{ matrix.rpmarch }}/langive-${VERSION}-1*.rpm "LanGive-linux-${{ matrix.arch }}.rpm"

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LanGive-linux-${{ matrix.arch }}
        path: |
          build/bin/LanGive-linux-${{ matrix.arch }}.AppImage
          build/bin/LanGive-linux-${{ matrix.arch }}.deb
          build/bin/LanGive-linux-${{ matrix.arch }}.rpm

  # ==================== Android Build ====================
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up Android NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> "$GITHUB_ENV"

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        gomobile init

    - name: Build langive.aar (multi-arch)
      run: |
        mkdir -p mobile/android/app/libs
        # gomobile bind 一次产 fat AAR，包含 arm64-v8a/armeabi-v7a/x86/x86_64
        # gomobile bind 不允许 ./internal/*，故对外通过 mobile/bridge/* 暴露 API
        gomobile bind \
          -target=android \
          -androidapi 21 \
          -javapkg=com.langive.bridge \
          -o mobile/android/app/libs/langive.aar \
          ./mobile/bridge/mdns ./mobile/bridge/transfer ./mobile/bridge/config ./mobile/bridge/security

    - name: Build Android APK
      run: |
        cd mobile/android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Rename APK
      run: |
        cd mobile/android/app/build/outputs/apk/release
        for f in *.apk; do
          cp "$f" "/tmp/LanGive-android-${{ github.ref_name }}.apk"
        done

    - name: Upload Android artifact
      uses: actions/upload-artifact@v4
      with:
        name: LanGive-android
        path: /tmp/LanGive-android-*.apk

  # ==================== Create Release ====================
  release:
    needs: [build-windows, build-macos, build-linux, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure
      run: ls -R artifacts/

    - name: Prepare release files
      run: |
        mkdir -p release
        find artifacts -type f \( -name '*.exe' -o -name '*.zip' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) -exec cp {} release/ \;
        ls -la release/

    - name: Read release notes
      id: notes
      run: |
        if [ -f .release/notes.md ]; then
          echo "has_notes=1" >> "$GITHUB_OUTPUT"
        else
          echo "has_notes=0" >> "$GITHUB_OUTPUT"
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        draft: false
        prerelease: false
        body_path: ${{ steps.notes.outputs.has_notes == '1' && '.release/notes.md' || '' }}
        generate_release_notes: ${{ steps.notes.outputs.has_notes != '1' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
