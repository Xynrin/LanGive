name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: false
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
          - android

jobs:
  # ==================== Windows Build ====================
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: amd64
          - arch: '386'
          - arch: arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Build Windows
      env:
        GOOS: windows
        GOARCH: ${{ matrix.arch }}
      run: |
        wails build -platform windows/${{ matrix.arch }} -ldflags "-X main.Version=${{ github.ref_name }}"

    - name: Rename output
      run: |
        cd build/bin
        mv LanGive.exe "LanGive-windows-${{ matrix.arch }}.exe"

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: LanGive-windows-${{ matrix.arch }}
        path: build/bin/LanGive-windows-${{ matrix.arch }}.exe

  # ==================== macOS Build ====================
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Build macOS
      env:
        GOOS: darwin
        GOARCH: ${{ matrix.arch }}
      run: |
        wails build -platform darwin/${{ matrix.arch }} -ldflags "-X main.Version=${{ github.ref_name }}"

    - name: Package macOS app
      run: |
        cd build/bin
        if [ "${{ matrix.arch }}" = "arm64" ]; then
          # macOS arm64 needs special handling
          zip -r "LanGive-macos-${{ matrix.arch }}.zip" LanGive.app
        else
          zip -r "LanGive-macos-${{ matrix.arch }}.zip" LanGive.app
        fi

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: LanGive-macos-${{ matrix.arch }}
        path: build/bin/LanGive-macos-${{ matrix.arch }}.zip

  # ==================== Linux Build ====================
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
          - arch: '386'
          - arch: arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        # Ubuntu 24.04 ships webkit2gtk 4.1; 4.0 is no longer available
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

    - name: Build Linux
      env:
        GOOS: linux
        GOARCH: ${{ matrix.arch }}
      run: |
        wails build -platform linux/${{ matrix.arch }} -ldflags "-X main.Version=${{ github.ref_name }}"

    - name: Package Linux binaries
      run: |
        cd build/bin
        mv LanGive "LanGive-linux-${{ matrix.arch }}"
        chmod +x "LanGive-linux-${{ matrix.arch }}"

    - name: Create AppImage (amd64 only)
      if: matrix.arch == 'amd64'
      run: |
        cd build/bin
        # Download appimagetool
        wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
        chmod +x appimagetool
        
        # Create AppDir structure
        mkdir -p LanGive.AppDir/usr/bin
        mkdir -p LanGive.AppDir/usr/share/icons
        cp "LanGive-linux-${{ matrix.arch }}" LanGive.AppDir/usr/bin/LanGive
        
        # Create desktop file
        cat > LanGive.AppDir/LanGive.desktop << 'EOF'
        [Desktop Entry]
        Name=LanGive
        Comment=Cross-platform LAN file transfer tool
        Exec=LanGive
        Icon=LanGive
        Terminal=false
        Type=Application
        Categories=Network;FileTransfer;
        Keywords=lan;transfer;share;file;
        EOF
        
        # Create icon placeholder
        touch LanGive.AppDir/LanGive.png
        cp LanGive.AppDir/LanGive.png LanGive.AppDir/usr/share/icons/
        
        # Build AppImage
        ./appimagetool LanGive.AppDir "LanGive-linux-${{ matrix.arch }}.AppImage"

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: LanGive-linux-${{ matrix.arch }}
        path: |
          build/bin/LanGive-linux-${{ matrix.arch }}
          build/bin/LanGive-linux-${{ matrix.arch }}.AppImage

  # ==================== Android Build ====================
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64-v8a
            goarch: arm64
          - arch: armeabi-v7a
            goarch: '386'
          - arch: x86_64
            goarch: amd64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up Android NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"

    - name: Install gomobile
      env:
        ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        # 新版 gomobile init 不再接受 -ndk，改读 ANDROID_NDK_HOME
        gomobile init

    - name: Build Android AAR
      env:
        GOOS: android
        GOARCH: ${{ matrix.goarch }}
      run: |
        cd mobile/android
        # Create AAR from Go code
        cd ../..
        gomobile bind -target=android -androidapi 21 -o mobile/android/app/libs/langive.aar ./internal/mdns ./internal/transfer ./internal/config ./internal/security

    - name: Build Android APK
      run: |
        cd mobile/android
        ./gradlew assembleRelease

    - name: Upload Android artifact
      uses: actions/upload-artifact@v4
      with:
        name: LanGive-android-${{ matrix.arch }}
        path: mobile/android/app/build/outputs/apk/release/*.apk

  # ==================== Create Release ====================
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure
      run: ls -R artifacts/

    - name: Prepare release files
      run: |
        mkdir -p release
        # Copy all artifacts to release folder
        find artifacts -type f -exec cp {} release/ \;
        # Rename for clarity
        cd release
        for f in *; do
          if [[ "$f" == *"-"* ]]; then
            # Already named
            :
          else
            echo "File: $f"
          fi
        done

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== Create Changelog ====================
  changelog:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate Changelog
      id: changelog
      run: |
        git log --oneline --pretty='%h %s' $(git describe --tags --abbrev=0)..HEAD > CHANGELOG.txt
        cat CHANGELOG.txt

    - name: Upload Changelog
      uses: actions/upload-artifact@v4
      with:
        name: changelog
        path: CHANGELOG.txt
