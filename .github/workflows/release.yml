name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: false
        type: choice
        options:
          - all
          - windows
          - macos
          - linux

jobs:
  # ==================== Windows Build ====================
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: '386'
          - arch: arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Build Windows
      env:
        GOOS: windows
        GOARCH: ${{ matrix.arch }}
      run: |
        wails build -platform windows/${{ matrix.arch }} -ldflags "-X main.Version=${{ github.ref_name }}"

    - name: Rename output
      shell: bash
      run: |
        cd build/bin
        mv LanGive.exe "LanGive-windows-${{ matrix.arch }}.exe"

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: LanGive-windows-${{ matrix.arch }}
        path: build/bin/LanGive-windows-${{ matrix.arch }}.exe

  # ==================== macOS Build ====================
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Build macOS
      env:
        GOOS: darwin
        GOARCH: ${{ matrix.arch }}
      run: |
        wails build -platform darwin/${{ matrix.arch }} -ldflags "-X main.Version=${{ github.ref_name }}"

    - name: Package macOS app
      run: |
        cd build/bin
        zip -r "LanGive-macos-${{ matrix.arch }}.zip" LanGive.app

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: LanGive-macos-${{ matrix.arch }}
        path: build/bin/LanGive-macos-${{ matrix.arch }}.zip

  # ==================== Linux Build (amd64 + arm64, AppImage + deb + RPM) ====================
  # amd64 在 ubuntu-latest 原生编译；arm64 在 ubuntu-24.04-arm 原生编译，避免交叉编译 GTK/WebKit 的复杂度。
  # Wails 2.10 默认链接 webkit2gtk-4.0，Ubuntu 24.04 仅有 4.1，故强制 -tags webkit2_41。
  build-linux:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            debarch: amd64
            rpmarch: x86_64
            appimage_arch: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            debarch: arm64
            rpmarch: aarch64
            appimage_arch: aarch64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Install Linux build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev libwebkit2gtk-4.1-dev \
          rpm fakeroot dpkg-dev file wget

    - name: Build Linux (native CGO)
      env:
        GOOS: linux
        CGO_ENABLED: '1'
      run: |
        wails build -platform linux/${{ matrix.arch }} -tags webkit2_41 -ldflags "-X main.Version=${{ github.ref_name }}"

    - name: Rename binary
      run: |
        cd build/bin
        mv LanGive "LanGive-linux-${{ matrix.arch }}"
        chmod +x "LanGive-linux-${{ matrix.arch }}"

    - name: Build AppImage
      run: |
        cd build/bin
        APPIMAGE_TOOL_ARCH="${{ matrix.appimage_arch }}"
        wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${APPIMAGE_TOOL_ARCH}.AppImage" -O appimagetool || \
        wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
        chmod +x appimagetool

        mkdir -p LanGive.AppDir/usr/bin LanGive.AppDir/usr/share/applications LanGive.AppDir/usr/share/icons/hicolor/256x256/apps
        cp "LanGive-linux-${{ matrix.arch }}" LanGive.AppDir/usr/bin/LanGive

        cat > LanGive.AppDir/LanGive.desktop << 'EOF'
        [Desktop Entry]
        Name=LanGive
        Comment=Cross-platform LAN file transfer tool
        Exec=LanGive
        Icon=LanGive
        Terminal=false
        Type=Application
        Categories=Network;FileTransfer;
        EOF
        cp LanGive.AppDir/LanGive.desktop LanGive.AppDir/usr/share/applications/

        # 占位图标（PNG），缺省时 appimagetool 会报错
        printf '\x89PNG\r\n\x1a\n' > LanGive.AppDir/LanGive.png || true
        cp LanGive.AppDir/LanGive.png LanGive.AppDir/usr/share/icons/hicolor/256x256/apps/

        cat > LanGive.AppDir/AppRun << 'EOF'
        #!/bin/sh
        HERE="$(dirname "$(readlink -f "$0")")"
        exec "$HERE/usr/bin/LanGive" "$@"
        EOF
        chmod +x LanGive.AppDir/AppRun

        ARCH=${APPIMAGE_TOOL_ARCH} ./appimagetool --no-appstream LanGive.AppDir "LanGive-linux-${{ matrix.arch }}.AppImage" || \
        ARCH=${APPIMAGE_TOOL_ARCH} ./appimagetool LanGive.AppDir "LanGive-linux-${{ matrix.arch }}.AppImage"

    - name: Build .deb
      run: |
        cd build/bin
        VERSION="${GITHUB_REF_NAME#v}"
        [ -z "$VERSION" ] && VERSION="0.0.0"
        PKG="langive_${VERSION}_${{ matrix.debarch }}"
        mkdir -p "$PKG/DEBIAN" "$PKG/usr/bin" "$PKG/usr/share/applications" "$PKG/usr/share/icons/hicolor/256x256/apps"
        cp "LanGive-linux-${{ matrix.arch }}" "$PKG/usr/bin/langive"
        chmod 755 "$PKG/usr/bin/langive"
        cat > "$PKG/usr/share/applications/langive.desktop" << 'EOF'
        [Desktop Entry]
        Name=LanGive
        Comment=Cross-platform LAN file transfer tool
        Exec=langive
        Icon=langive
        Terminal=false
        Type=Application
        Categories=Network;FileTransfer;
        EOF
        cat > "$PKG/DEBIAN/control" << EOF
        Package: langive
        Version: ${VERSION}
        Section: net
        Priority: optional
        Architecture: ${{ matrix.debarch }}
        Maintainer: Xynrin <noreply@example.com>
        Depends: libgtk-3-0, libwebkit2gtk-4.1-0
        Description: Cross-platform LAN file transfer tool
         LanGive is a cross-platform LAN file transfer tool built with Wails v2.
        EOF
        dpkg-deb --build --root-owner-group "$PKG"
        mv "${PKG}.deb" "LanGive-linux-${{ matrix.arch }}.deb"

    - name: Build .rpm
      run: |
        cd build/bin
        VERSION="${GITHUB_REF_NAME#v}"
        [ -z "$VERSION" ] && VERSION="0.0.0"

        mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
        BIN="$(pwd)/LanGive-linux-${{ matrix.arch }}"

        cat > ~/rpmbuild/SPECS/langive.spec << EOF
        Name:           langive
        Version:        ${VERSION}
        Release:        1%{?dist}
        Summary:        Cross-platform LAN file transfer tool
        License:        MIT
        URL:            https://github.com/Xynrin/LanGive
        BuildArch:      ${{ matrix.rpmarch }}
        AutoReqProv:    no

        %description
        LanGive is a cross-platform LAN file transfer tool built with Wails v2.

        %install
        mkdir -p %{buildroot}/usr/bin
        install -m 0755 ${BIN} %{buildroot}/usr/bin/langive

        %files
        /usr/bin/langive
        EOF

        rpmbuild -bb --target=${{ matrix.rpmarch }} ~/rpmbuild/SPECS/langive.spec
        cp ~/rpmbuild/RPMS/${{ matrix.rpmarch }}/langive-${VERSION}-1*.rpm "LanGive-linux-${{ matrix.arch }}.rpm"

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LanGive-linux-${{ matrix.arch }}
        path: |
          build/bin/LanGive-linux-${{ matrix.arch }}.AppImage
          build/bin/LanGive-linux-${{ matrix.arch }}.deb
          build/bin/LanGive-linux-${{ matrix.arch }}.rpm

  # ==================== Android Build (DISABLED) ====================
  # 暂时禁用：mobile/android/ 仅有占位 README，没有 Gradle 工程，
  # gomobile bind 与 ./gradlew assembleRelease 无法跑通。
  # 等 Android 工程落地后再开启此 job。
  # build-android:
  #   if: false
  #   runs-on: ubuntu-latest
  #   ...

  # ==================== Create Release ====================
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure
      run: ls -R artifacts/

    - name: Prepare release files
      run: |
        mkdir -p release
        find artifacts -type f \( -name '*.exe' -o -name '*.zip' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) -exec cp {} release/ \;
        ls -la release/

    - name: Read release notes
      id: notes
      run: |
        if [ -f .release/notes.md ]; then
          echo "has_notes=1" >> "$GITHUB_OUTPUT"
        else
          echo "has_notes=0" >> "$GITHUB_OUTPUT"
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        draft: false
        prerelease: false
        body_path: ${{ steps.notes.outputs.has_notes == '1' && '.release/notes.md' || '' }}
        generate_release_notes: ${{ steps.notes.outputs.has_notes != '1' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
